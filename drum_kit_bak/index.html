<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play the Game</title>
</head>
<body>
    <head>
    <meta charset="utf-8">
    <title>Drum Game</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet">
  </head>

  <body>
    <h1 id="title">Drum 🥁 Project</h1>
    <div class="set">
      <!-- path to the image is 'folderName/fileName' -->
      <button class="drum" style="background-image: url('images/tom1.png');">w</button>
      <button class="drum" style="background-image: url('images/tom2.png');">a</button>
      <button class="drum" style="background-image: url('images/tom3.png');">s</button>
      <button class="drum" style="background-image: url('images/tom4.png');">d</button>
      <button class="drum" style="background-image: url('images/snare.png');">j</button>
      <button class="drum" style="background-image: url('images/crash.png');">k</button>
      <button class="drum" style="background-image: url('images/kick.png');">l</button>
    </div>
    <h3 id="keys-pressed">You hit</h3>
    <button class="pretty-button" onclick="playRecord()"> Replay </button>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <button class="pretty-button" onclick="location.reload()"> Refresh </button>
    <br><br>

    <footer>
      <b>Click the image or press a key to play sound</b><br><br>
      - Taconic High School - <br>
      [ IT & CyberSecurity Program ]
    </footer>

    <script src="script.js"></script>
    
  </body>
</body>
</html>
